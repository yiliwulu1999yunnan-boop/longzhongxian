# 面点师岗位画像配置
# 数据来源：门店招聘岗位信息.xlsx、选人课程（储备）.pdf、招聘课程（储备）.pdf

position_id: mian_dian_shi
position_name: 面点师
position_category: 基层岗位

# ===== 硬规则阈值 =====
hard_rules:
  age_range:
    min: 20
    max: 40
  education_min: 不限
  salary_range:
    probation_min: 3500
    probation_max: 4000
    regular_min: 4000
    regular_max: 6000
  experience_required: false
  accept_early_morning: true

# ===== 行业关键词 =====
industry_keywords:
  whitelist:
    - 面点
    - 包子
    - 馒头
    - 早餐
    - 餐饮
    - 后厨
    - 烘焙
    - 中式面点
    - 蒸笼
    - 小吃
    - 快餐
  blacklist:
    - 夜班
    - 酒吧
    - KTV
    - 网吧

# ===== 红线条件 =====
red_flags:
  - 年龄不在 20-40 范围内
  - 明确表示无法接受凌晨上班
  - 简历存在严重造假嫌疑（工作经历时间线矛盾）
  - 近一年内有 3 份及以上工作（频繁跳槽）
  - 期望薪资远超岗位范围（超过 8000 元/月）

# ===== LLM 评估配置 =====
llm_evaluation:
  dimensions:
    - name: 能早起/手脚麻利
      weight: 15
      description: >
        判断求职者是否能适应凌晨 03:00-03:30 上班。关注其过往作息习惯、
        是否有早起工作经历、对早起的态度和应对方法。
    - name: 吃苦耐劳
      weight: 15
      description: >
        判断求职者是否能承受长时间站立、体力劳动。关注过往工作强度、
        对辛苦工作的态度、是否有坚持的实际案例。
    - name: 抗压能力
      weight: 10
      description: >
        判断求职者在高峰期忙碌时能否保持高效。关注过往应对忙碌的经验、
        面对压力的心态和调整方式。
    - name: 服从管理与安排
      weight: 10
      description: >
        判断求职者是否愿意服从店长管理，接受临时调整。关注对加班、
        调岗、额外任务的态度。
    - name: 稳定性
      weight: 15
      description: >
        判断求职者能否长期稳定工作。关注过往工作时长、离职原因、
        家庭情况、经济压力、未来规划。
    - name: 求职动机
      weight: 10
      description: >
        判断求职者选择该岗位的真实原因。关注对餐饮行业的了解和认同、
        期望收获、职业规划是否与岗位匹配。
    - name: 沟通表达能力
      weight: 10
      description: >
        判断求职者是否能清晰表达。关注简历填写完整度、
        自我介绍的条理性。
    - name: 相关经验
      weight: 15
      description: >
        有面点相关经验者优先。评估过往工作内容与面点岗位的相关性。
        无经验不扣分，有经验加分。

  passing_score: 60

  prompt_template: |
    你是笼中仙餐饮公司的 AI 招聘助手，正在评估一位应聘「{position_name}」岗位的候选人。

    ## 岗位基本要求
    {hard_rules_summary}

    ## 岗位职责
    1. 按照公司标准制作小笼包
    2. 按照公司标准做准备工作
    3. 打扫区域卫生

    ## 工作时间
    - 通班：凌晨 03:30—13:30
    - 早晚班：凌晨 03:00—10:00，16:00—19:00（中间午休）

    ## 评估维度
    {dimensions_detail}

    ## 评估要求
    1. 对每个维度给出 0-100 分，并说明理由
    2. 根据各维度权重计算加权总分
    3. 总分 ≥80 判定为「推荐沟通」，60-79 为「可以看看」，<60 为「不建议」
    4. 特别关注：该岗位需要凌晨上班，候选人的早起适应能力是关键因素
    5. 有面点经验优先，但无经验不作为否决条件

# ===== 打招呼模板消息 =====
greeting_template: >
  您好，我们是笼中仙，昆明100+直营门店持续拓店中。面点师岗位综合薪资4K-6K+，
  包吃住月休4天，晋升通道透明（员工→储备→店长）。看了您的履历觉得很合适，
  方便聊聊吗？
