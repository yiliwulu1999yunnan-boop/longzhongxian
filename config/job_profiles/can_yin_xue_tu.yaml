# 餐饮学徒岗位画像配置（综合岗位，覆盖面点/煮品/收银）
# 数据来源：门店招聘岗位信息.xlsx、招聘课程（储备）.pdf
# 说明：当竞品岗位发布受限时，用「餐饮学徒」合并发布覆盖三个基层岗位

position_id: can_yin_xue_tu
position_name: 餐饮学徒
position_category: 基层岗位

# ===== 硬规则阈值 =====
hard_rules:
  age_range:
    min: 20
    max: 40
    flexible_max: 45  # 35-45 有相关经验可考虑（合并发布时放宽）
  education_min: 不限
  salary_range:
    probation_min: 3500
    probation_max: 4000
    regular_min: 4000
    regular_max: 6000
  experience_required: false
  accept_early_morning: true

# ===== 行业关键词 =====
industry_keywords:
  whitelist:
    - 餐饮
    - 早餐
    - 快餐
    - 后厨
    - 厨师
    - 面点
    - 包子
    - 收银
    - 服务员
    - 小吃
    - 中餐
    - 米线
    - 面条
    - 奶茶
    - 饮品
  blacklist:
    - 夜班
    - 酒吧
    - KTV
    - 网吧

# ===== 红线条件 =====
red_flags:
  - 年龄不在 20-45 范围内
  - 35-45 岁且无餐饮相关工作经验
  - 明确表示无法接受凌晨上班
  - 简历存在严重造假嫌疑（工作经历时间线矛盾）
  - 近一年内有 3 份及以上工作（频繁跳槽）
  - 期望薪资远超岗位范围（超过 8000 元/月）

# ===== LLM 评估配置 =====
llm_evaluation:
  dimensions:
    - name: 能早起/手脚麻利
      weight: 15
      description: >
        判断求职者是否能适应凌晨上班（面点最早 03:00）。关注其过往作息习惯、
        对早起的态度和应对方法。
    - name: 吃苦耐劳
      weight: 15
      description: >
        判断求职者是否能承受长时间站立、体力劳动。
        关注过往工作强度、对辛苦工作的态度和坚持案例。
    - name: 抗压能力
      weight: 10
      description: >
        判断求职者在高峰期忙碌时能否保持高效。
        关注过往应对忙碌的经验。
    - name: 服务意识
      weight: 10
      description: >
        判断求职者是否具备服务意识。收银方向还需具备推销意识。
    - name: 服从管理与安排
      weight: 10
      description: >
        判断求职者是否愿意服从店长管理，接受轮岗学习和临时调整。
    - name: 稳定性
      weight: 15
      description: >
        判断求职者能否长期稳定工作。关注过往工作时长、离职原因、
        家庭情况、经济压力。
    - name: 沟通表达能力
      weight: 10
      description: >
        判断求职者沟通是否清晰流畅。
    - name: 相关经验
      weight: 15
      description: >
        有餐饮相关工作经验者优先。评估过往工作内容与面点/煮品/收银的相关性。
        无经验不扣分。

  passing_score: 60

  prompt_template: |
    你是笼中仙餐饮公司的 AI 招聘助手，正在评估一位应聘「{position_name}」岗位的候选人。

    ## 岗位基本要求
    {hard_rules_summary}

    ## 岗位说明
    餐饮学徒是综合岗位，涵盖以下方向：
    1.【面点岗位】按照公司标准制作小笼包，保证店铺正常供应
    2.【煮品岗位】负责馄饨、米线、面条、粥等出品
    3.【收银岗位】给顾客点单，推荐店内产品，制作饮品，收银做账

    ## 工作时间（按岗位方向不同）
    - 面点：凌晨 03:00-03:30 起，早起补贴 16 元/次
    - 煮品：凌晨 04:30 起，早起补贴 13 元/次
    - 收银：凌晨 05:30 起，早起补贴 9 元/次

    ## 评估维度
    {dimensions_detail}

    ## 评估要求
    1. 对每个维度给出 0-100 分，并说明理由
    2. 根据各维度权重计算加权总分
    3. 总分 ≥80 判定为「推荐沟通」，60-79 为「可以看看」，<60 为「不建议」
    4. 35-45 岁候选人必须有餐饮相关经验，否则降级处理
    5. 如果候选人明显更适合某个具体方向，请在评估中注明推荐方向

# ===== 打招呼模板消息 =====
greeting_template: >
  您好，我们是笼中仙，昆明100+直营门店持续拓店中。面点/煮品/收银多岗可选，
  综合薪资4K-6K+，包吃住月休4天，晋升透明（员工→储备→店长7K-10K+）。
  看了您的履历觉得很合适，方便聊聊吗？
