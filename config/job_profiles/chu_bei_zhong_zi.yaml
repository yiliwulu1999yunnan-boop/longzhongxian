# 储备种子岗位画像配置（内部培养储备店长）
# 数据来源：门店招聘岗位信息.xlsx、选人课程（储备）.pdf

position_id: chu_bei_zhong_zi
position_name: 储备种子
position_category: 管理储备岗位

# ===== 硬规则阈值 =====
hard_rules:
  age_range:
    min: 20
    max: 35
  education_min: 初中
  salary_range:
    probation_min: 3500
    probation_max: 4000
    regular_min: 4000
    regular_max: 6000
  experience_required: false
  accept_early_morning: true
  accept_store_transfer: true

# ===== 行业关键词 =====
industry_keywords:
  whitelist:
    - 餐饮
    - 店长
    - 管理
    - 储备
    - 领班
    - 主管
    - 快餐
    - 早餐
    - 门店运营
    - 后厨
    - 收银
    - 面点
    - 团队管理
  blacklist:
    - 夜班
    - 酒吧
    - KTV
    - 网吧

# ===== 红线条件 =====
red_flags:
  - 年龄不在 20-35 范围内
  - 学历低于初中
  - 明确表示无法接受凌晨上班
  - 明确表示无法接受调店
  - 简历存在严重造假嫌疑（工作经历时间线矛盾）
  - 近一年内有 3 份及以上工作（频繁跳槽）
  - 期望薪资远超岗位范围（超过 10000 元/月）

# ===== LLM 评估配置 =====
llm_evaluation:
  dimensions:
    - name: 能早起/手脚麻利
      weight: 10
      description: >
        判断求职者是否能适应凌晨上班。储备种子需轮岗学习三个岗位，
        必须适应最早的面点班次。
    - name: 吃苦耐劳
      weight: 10
      description: >
        判断求职者是否能承受高强度工作。储备种子学习期间需掌握
        面点、煮品、收银全部技能，工作量更大。
    - name: 服务意识与价值观认同
      weight: 10
      description: >
        判断求职者是否认同公司「顾客第一、多劳多得、遵从标准」的价值观，
        是否具备服务意识。
    - name: 管理潜力与企图心
      weight: 20
      description: >
        判断求职者是否有成为店长的强烈意愿和企图心，是否渴望高收入。
        关注其职业规划、成长目标、主动性。这是储备种子最核心的评估维度。
    - name: 服从管理与接受调店
      weight: 10
      description: >
        判断求职者是否愿意服从安排、不斤斤计较、不过于在意个人得失，
        能否接受调店安排。
    - name: 稳定性
      weight: 15
      description: >
        判断求职者能否长期稳定工作。储备种子培养周期较长，
        稳定性尤为重要。
    - name: 学习能力与理解力
      weight: 10
      description: >
        判断求职者是否具备一定的学习能力和理解力。储备种子需要
        学习运营管理技能（考勤、排班、计分、订货等）。
    - name: 沟通与责任心
      weight: 10
      description: >
        判断求职者沟通能力和责任心。储备种子需善于沟通、
        愿意多付出、责任心强。
    - name: 餐饮管理经验
      weight: 5
      description: >
        有餐饮行业管理经验者优先。无经验不扣分，有经验显著加分。

  passing_score: 65

  prompt_template: |
    你是笼中仙餐饮公司的 AI 招聘助手，正在评估一位应聘「{position_name}」岗位的候选人。

    ## 岗位基本要求
    {hard_rules_summary}

    ## 岗位说明
    储备种子是公司内部培养的储备店长候选人：
    一、岗位技能：前期需在面点、煮品、收银 3 个岗位轮岗学习，熟练掌握岗位技能
    二、协助店长日常运营管理：
    1. 考勤、排班、计分、财务数据填写、系统日常操作
    2. 根据门店需要订货、收货、验货
    3. 检查 QSCS
    4. 协助各岗位日常工作
    5. 培养员工基本技能

    ## 晋升通道
    学徒→一级员工→二级→三级→储备店长→代理店长→店长（综合薪资 7K-10K+）

    ## 评估维度
    {dimensions_detail}

    ## 评估要求
    1. 对每个维度给出 0-100 分，并说明理由
    2. 根据各维度权重计算加权总分
    3. 总分 ≥80 判定为「推荐沟通」，65-79 为「可以看看」，<65 为「不建议」
    4. 管理潜力与企图心是最核心维度，候选人必须展现出成为店长的强烈意愿
    5. 必须接受调店，这是硬性要求
    6. 有餐饮管理经验者优先，但非必要条件

# ===== 打招呼模板消息 =====
greeting_template: >
  您好，我们是笼中仙，昆明100+直营门店持续拓店中。储备店长岗位综合薪资4K-6K+，
  晋升后7K-10K+含五险，包吃住月休4天，晋升通道公开透明。看了您的履历觉得很合适，
  方便聊聊吗？
