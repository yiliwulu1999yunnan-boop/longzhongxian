# 外聘储备岗位画像配置（外部招聘有经验的储备店长）
# 数据来源：门店招聘岗位信息.xlsx

position_id: wai_pin_chu_bei
position_name: 外聘储备
position_category: 管理储备岗位

# ===== 硬规则阈值 =====
hard_rules:
  age_range:
    min: 20
    max: 35
  education_min: 初中
  salary_range:
    probation_min: 4500
    probation_max: 5000
    regular_min: 5000
    regular_max: 6000
  experience_required: true
  experience_min_years: 1  # 需一年以上餐饮管理经验
  accept_early_morning: true
  accept_store_transfer: true

# ===== 行业关键词 =====
industry_keywords:
  whitelist:
    - 餐饮管理
    - 店长
    - 门店管理
    - 领班
    - 店助
    - 储备店长
    - 后厨管理
    - 餐饮运营
    - 连锁
    - 快餐
    - 团队管理
    - 排班
    - 订货
  blacklist:
    - 夜班
    - 酒吧
    - KTV
    - 网吧

# ===== 红线条件 =====
red_flags:
  - 年龄不在 20-35 范围内
  - 学历低于初中
  - 无餐饮管理相关工作经验
  - 餐饮管理经验不足一年
  - 明确表示无法接受凌晨上班
  - 明确表示无法接受调店
  - 简历存在严重造假嫌疑（工作经历时间线矛盾）
  - 近一年内有 3 份及以上工作（频繁跳槽）
  - 期望薪资远超岗位范围（超过 12000 元/月）

# ===== LLM 评估配置 =====
llm_evaluation:
  dimensions:
    - name: 餐饮管理经验
      weight: 25
      description: >
        核心维度。评估候选人是否具备一年以上餐饮门店管理经验，
        包括领班、店助、储备店长、后厨管理等岗位经验。
        关注管理过的团队规模、日常管理内容、管理成果。
    - name: 能早起/手脚麻利
      weight: 10
      description: >
        判断求职者是否能适应凌晨上班。
    - name: 吃苦耐劳
      weight: 10
      description: >
        判断求职者是否能承受高强度管理工作。
    - name: 管理潜力与企图心
      weight: 15
      description: >
        判断求职者是否有成为店长的强烈意愿，是否认同公司价值观
        （顾客第一、多劳多得、遵从标准），职业规划是否清晰。
    - name: 服从管理与接受调店
      weight: 10
      description: >
        判断求职者是否愿意服从安排、接受调店。
    - name: 稳定性
      weight: 15
      description: >
        判断求职者能否长期稳定工作。外聘储备培养投入更大，
        稳定性极为重要。关注过往工作时长和离职原因。
    - name: 沟通与团队协作
      weight: 10
      description: >
        判断求职者沟通能力、团队协作和领导力。
    - name: 学习能力
      weight: 5
      description: >
        判断求职者能否快速学习笼中仙的运营标准和流程。

  passing_score: 65

  prompt_template: |
    你是笼中仙餐饮公司的 AI 招聘助手，正在评估一位应聘「{position_name}」岗位的候选人。

    ## 岗位基本要求
    {hard_rules_summary}

    ## 岗位说明
    外聘储备是面向外部有餐饮管理经验人员招聘的储备店长岗位：
    - 必须有一年以上餐饮管理经验（领班、店助、储备店长、后厨管理等）
    - 入职后快速学习公司运营标准，目标晋升为店长

    ## 晋升通道
    外聘储备（试用期）→外聘储备（转正）→代理店长→店长（综合薪资 7K-10K+含五险）

    ## 评估维度
    {dimensions_detail}

    ## 评估要求
    1. 对每个维度给出 0-100 分，并说明理由
    2. 根据各维度权重计算加权总分
    3. 总分 ≥80 判定为「推荐沟通」，65-79 为「可以看看」，<65 为「不建议」
    4. 餐饮管理经验是硬性要求，无相关经验直接判定为「不建议」
    5. 重点核实管理经验的真实性和深度

# ===== 打招呼模板消息 =====
greeting_template: >
  您好，我们是笼中仙，昆明100+直营门店持续拓店中。外聘储备店长岗位综合薪资5K-6K+，
  晋升后7K-10K+含五险，包吃住月休4天。看了您的管理经验觉得非常匹配，方便聊聊吗？
