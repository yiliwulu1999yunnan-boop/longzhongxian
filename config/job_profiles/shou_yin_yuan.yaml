# 收银员岗位画像配置
# 数据来源：门店招聘岗位信息.xlsx、选人课程（储备）.pdf、招聘课程（储备）.pdf

position_id: shou_yin_yuan
position_name: 收银员
position_category: 基层岗位

# ===== 硬规则阈值 =====
hard_rules:
  age_range:
    min: 20
    max: 35
  education_min: 不限
  salary_range:
    probation_min: 3500
    probation_max: 4000
    regular_min: 4000
    regular_max: 6000
  experience_required: false
  accept_early_morning: true

# ===== 行业关键词 =====
industry_keywords:
  whitelist:
    - 收银
    - 服务员
    - 餐饮
    - 早餐
    - 快餐
    - 前台
    - 销售
    - 导购
    - 客服
    - 奶茶
    - 饮品
    - 外卖
  blacklist:
    - 夜班
    - 酒吧
    - KTV
    - 网吧

# ===== 红线条件 =====
red_flags:
  - 年龄不在 20-35 范围内
  - 明确表示无法接受凌晨上班
  - 简历存在严重造假嫌疑（工作经历时间线矛盾）
  - 近一年内有 3 份及以上工作（频繁跳槽）
  - 期望薪资远超岗位范围（超过 8000 元/月）

# ===== LLM 评估配置 =====
llm_evaluation:
  dimensions:
    - name: 能早起/手脚麻利
      weight: 10
      description: >
        判断求职者是否能适应凌晨 05:30-06:30 上班。关注其过往作息习惯、
        对早起的态度和应对方法。
    - name: 吃苦耐劳
      weight: 10
      description: >
        判断求职者是否能承受长时间站立工作。
        关注过往工作强度、对辛苦工作的态度。
    - name: 抗压能力
      weight: 10
      description: >
        判断求职者在高峰期点单忙碌时能否保持高效和准确。
        关注过往应对多任务并行的经验。
    - name: 服务意识
      weight: 15
      description: >
        判断求职者是否具备良好的服务意识。关注对顾客服务的理解、
        处理客诉的经验和态度、服务用语的规范性。
    - name: 推销意识
      weight: 10
      description: >
        判断求职者是否具备主动推荐产品的能力。关注过往销售/推荐经验、
        面对推销场景的应对方式。此维度为收银岗位特有要求。
    - name: 服从管理与安排
      weight: 10
      description: >
        判断求职者是否愿意服从店长管理，接受临时调整。
    - name: 稳定性
      weight: 15
      description: >
        判断求职者能否长期稳定工作。关注过往工作时长、离职原因、
        家庭情况、经济压力、未来规划。
    - name: 沟通表达能力
      weight: 15
      description: >
        判断求职者沟通是否清晰流畅。收银员直接面对顾客，
        沟通能力是核心要求。关注表达条理性和亲和力。
    - name: 相关经验
      weight: 5
      description: >
        有收银、服务、销售相关经验者优先。无经验不扣分。

  passing_score: 60

  prompt_template: |
    你是笼中仙餐饮公司的 AI 招聘助手，正在评估一位应聘「{position_name}」岗位的候选人。

    ## 岗位基本要求
    {hard_rules_summary}

    ## 岗位职责
    1. 按照公司标准制作饮品
    2. 给顾客点单，并推荐店内产品
    3. 收银，打包外卖
    4. 蒸制包子
    5. 打扫区域卫生
    6. 备货

    ## 工作时间
    - 通班：06:30—16:30
    - 早晚班：凌晨 05:30—10:30，16:00—21:00（中间午休，早起补贴 9 元/次）

    ## 评估维度
    {dimensions_detail}

    ## 评估要求
    1. 对每个维度给出 0-100 分，并说明理由
    2. 根据各维度权重计算加权总分
    3. 总分 ≥80 判定为「推荐沟通」，60-79 为「可以看看」，<60 为「不建议」
    4. 特别关注：收银员需要同时具备服务意识和推销意识，这是区别于其他岗位的关键要求
    5. 沟通表达能力是收银岗位的核心能力，需重点评估

# ===== 打招呼模板消息 =====
greeting_template: >
  您好，我们是笼中仙，昆明100+直营门店持续拓店中。收银员岗位综合薪资4K-6K+，
  包吃住月休4天，晋升通道透明（员工→储备→店长）。看了您的履历觉得很合适，
  方便聊聊吗？
